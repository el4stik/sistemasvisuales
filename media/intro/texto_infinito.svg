<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <style>
    text {
      font-family: 'Bauhaus 93', 'Century Gothic', 'Futura', sans-serif;
      font-weight: bold;
      text-anchor: middle;
      fill: black;
    }
    .big-text { font-size: 85px; letter-spacing: -2px; }
    .small-text { font-size: 32px; letter-spacing: 4px; font-weight: normal; }
  </style>
  <rect width="100%" height="100%" fill="white"/>
  <text x="50%" y="100" class="big-text">EL INFINITO</text>
  <text x="50%" y="185" class="big-text">NO ES UN</text>
  <text x="50%" y="270" class="big-text">DESTINO</text>
  <text x="50%" y="355" class="big-text">ES LA MISIÓN</text>
  <text x="50%" y="430" class="small-text">LA ENERGÍA ES UNA SOLA</text>
</svg>
